<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LMQ</title>
<link rel="apple-touch-icon" href="lmq-icon.png">
<link rel="icon" type="image/png" href="lmq-icon.png">
<meta name="theme-color" content="#2e3440">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="LMQ">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#2e3440;--bg2:#353c4a;--bg3:#3d4555;
  --rule:rgba(255,255,255,0.07);
  --pink:#e91e8c;--pink-dim:rgba(233,30,140,0.15);
  --orange:#ff6b35;
  --white:#f2f0ed;--w80:rgba(242,240,237,0.80);
  --w50:rgba(242,240,237,0.50);--w25:rgba(242,240,237,0.25);
  --w10:rgba(242,240,237,0.07);
}

html,body{height:100%;width:100%;background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;font-weight:300;overflow:hidden;}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
#header{flex-shrink:0;display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--rule);}
#logo-img{height:44px;width:44px;object-fit:contain;border-radius:6px;}
#logo-fallback{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:.22em;color:#d4af37;}
#workout-label{font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--w50);text-align:center;flex:1;padding:0 12px;}
#workout-label span{color:var(--pink);font-weight:600;}
#user-btn{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--pink);background:transparent;border:1px solid rgba(233,30,140,0.35);border-radius:20px;padding:5px 12px;cursor:pointer;white-space:nowrap;}

/* GREETING SCREEN */
#greeting-screen{flex:1;display:none;flex-direction:column;padding:28px 24px;overflow-y:auto;}
#greeting-screen.show{display:flex;}
#greeting-hi{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--white);margin-bottom:4px;}
#greeting-sub{font-size:11px;color:var(--w50);letter-spacing:.08em;margin-bottom:28px;}
#greeting-recommended{background:var(--pink);border-radius:12px;padding:20px;margin-bottom:16px;cursor:pointer;border:none;width:100%;text-align:left;}
#greeting-rec-label{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:6px;}
#greeting-rec-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#fff;margin-bottom:4px;}
#greeting-rec-sub{font-size:10px;color:rgba(255,255,255,0.75);letter-spacing:.05em;}
#greeting-focus{margin-top:20px;padding-top:20px;border-top:1px solid var(--rule);}
#greeting-focus-label{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--pink);margin-bottom:6px;}
#greeting-focus-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--w80);line-height:1.5;}

/* WORKOUT BODY */
#body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 24px;display:none;}
#body.show{display:block;}
#focus-bar{padding:10px 0 14px;border-bottom:1px solid var(--rule);margin-bottom:20px;}
#focus-label{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--pink);margin-bottom:4px;}
#focus-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;font-weight:300;color:var(--w80);line-height:1.4;}

/* EXERCISE CARDS */
.ex-card{background:var(--bg2);border-radius:10px;margin-bottom:10px;overflow:hidden;border:1px solid var(--rule);transition:border-color 0.3s;}
.ex-card.active{border-color:var(--pink);}
.ex-card.done{opacity:0.7;}
.ex-card-header{display:flex;align-items:center;padding:14px 16px;gap:12px;}
.ex-number{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--w25);min-width:18px;}
.ex-card.active .ex-number{color:var(--pink);}
.ex-card.done .ex-number{color:var(--orange);}
.ex-name-block{flex:1;}
.ex-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--white);line-height:1.1;}
.ex-note{font-size:10px;color:var(--w50);letter-spacing:.04em;margin-top:2px;}
.ex-status{font-size:18px;min-width:24px;text-align:right;}
.ex-body{padding:0 16px 16px;display:none;}
.ex-card.active .ex-body{display:block;}
.set-progress{display:flex;gap:6px;margin-bottom:16px;}
.set-pip{flex:1;height:3px;border-radius:2px;background:var(--w10);}
.set-pip.done{background:var(--orange);}
.set-pip.active{background:var(--pink);}
.set-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--w50);margin-bottom:14px;}
.set-label span{color:var(--pink);}
.inputs-row{display:flex;gap:10px;margin-bottom:14px;}
.input-block{flex:1;background:var(--bg3);border-radius:8px;padding:12px 14px;border:1px solid var(--rule);}
.input-lbl{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--w50);margin-bottom:6px;}
.input-num{width:100%;background:transparent;border:none;outline:none;font-size:26px;font-weight:300;color:var(--white);font-family:'Inter',sans-serif;}
.input-num::placeholder{color:var(--w25);}
.nailed-btn{width:100%;padding:14px;background:var(--pink);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;}
.nailed-btn:active{background:#c4177a;}
#scroll-spacer{height:60px;}

/* REST / SPECIAL DAY SCREEN */
#day-screen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;}
#day-screen.show{display:flex;}
#day-icon{font-size:52px;margin-bottom:20px;}
#day-type{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--pink);margin-bottom:8px;}
#day-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--white);margin-bottom:24px;line-height:1.2;}
#day-idea{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;font-weight:300;color:var(--w80);line-height:1.5;margin-bottom:36px;padding:0 8px;}
.day-skip-row{display:flex;gap:10px;}
.day-action-btn{padding:10px 20px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;}
.day-skip{background:transparent;border:1px solid var(--rule);color:var(--w50);}
.day-reset{background:transparent;border:1px solid rgba(233,30,140,0.4);color:var(--pink);}

/* BOTTOM BAR */
#bottombar{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:10px 20px 28px;border-top:1px solid var(--rule);background:var(--bg);}
.bar-btn{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--w50);background:transparent;border:1px solid var(--rule);border-radius:4px;padding:7px 16px;cursor:pointer;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.show{opacity:1;pointer-events:all;}

/* REST TIMER */
#rest-overlay{background:rgba(30,36,46,0.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
#rest-label{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--w50);margin-bottom:16px;}
#rest-num{font-family:'Cormorant Garamond',serif;font-size:110px;font-weight:300;line-height:1;color:var(--white);transition:color 0.3s;margin-bottom:4px;}
#rest-num.urgent{color:var(--pink);}
#rest-next{font-size:11px;color:var(--w50);letter-spacing:.08em;margin-bottom:8px;text-align:center;padding:0 32px;}
#rest-ready{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--pink);height:18px;margin-bottom:40px;}
#rest-skip{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--w50);background:transparent;border:1px solid var(--rule);border-radius:4px;padding:10px 28px;cursor:pointer;}

/* USER OVERLAY */
#user-overlay{background:rgba(20,24,34,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);gap:0;}
.user-name-btn{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;letter-spacing:.08em;color:var(--w50);background:transparent;border:none;cursor:pointer;padding:20px 0;transition:color 0.2s;}
.user-name-btn.active{color:var(--pink);}
.user-divider{width:32px;height:1px;background:var(--rule);margin:4px auto;}
#user-dismiss{position:absolute;bottom:48px;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--w25);background:transparent;border:none;cursor:pointer;padding:8px;}

/* DAY 7 PICKER */
#day7-overlay{background:rgba(20,24,34,0.98);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);text-align:center;padding:40px 32px;}
#day7-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--white);margin-bottom:8px;}
#day7-sub{font-size:11px;color:var(--w50);letter-spacing:.06em;margin-bottom:28px;}
.d7-btn{width:100%;padding:16px;background:var(--bg2);border:1px solid var(--rule);border-radius:10px;margin-bottom:8px;cursor:pointer;text-align:left;transition:border-color 0.2s;}
.d7-btn-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--white);margin-bottom:2px;}
.d7-btn-sub{font-size:10px;color:var(--w50);letter-spacing:.05em;}

/* STYLE OVERLAY */
#style-overlay{justify-content:flex-end;align-items:stretch;background:rgba(20,24,34,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
#style-sheet{background:var(--bg2);border-top:1px solid var(--rule);border-radius:16px 16px 0 0;padding:24px 24px 48px;transform:translateY(100%);transition:transform 0.3s ease;position:relative;}
#style-overlay.show #style-sheet{transform:translateY(0);}
#style-close{position:absolute;top:18px;right:20px;font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--w50);background:transparent;border:none;cursor:pointer;}
.sty-label{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--w25);margin-bottom:10px;margin-top:18px;}
.sty-label:first-child{margin-top:0;}
.sty-emoji-row{display:flex;gap:8px;}
.sty-em{flex:1;font-size:22px;padding:9px 4px;border-radius:6px;background:var(--w10);border:1px solid transparent;cursor:pointer;text-align:center;}
.sty-em.sel{border-color:var(--pink);background:var(--pink-dim);}
.sty-color-row{display:flex;gap:6px;flex-wrap:wrap;}
.sty-col{flex:1;min-width:90px;padding:9px 6px;border-radius:6px;font-size:8px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;text-align:center;color:var(--w50);background:var(--w10);border:2px solid transparent;line-height:1.3;}
.sty-col.sel{border-color:var(--pink);color:var(--white);}
.sty-font-row{display:flex;gap:6px;flex-wrap:wrap;}
.sty-font{padding:8px 12px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;color:var(--w50);background:var(--w10);border:1px solid transparent;}
.sty-font.sel{border-color:var(--pink);color:var(--white);}

/* PROGRESS OVERLAY */
#progress-overlay{justify-content:flex-end;align-items:stretch;background:rgba(20,24,34,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
#progress-sheet{background:var(--bg2);border-top:1px solid var(--rule);border-radius:16px 16px 0 0;padding:24px 24px 48px;transform:translateY(100%);transition:transform 0.3s ease;position:relative;max-height:80vh;overflow-y:auto;}
#progress-overlay.show #progress-sheet{transform:translateY(0);}
#progress-close{position:absolute;top:18px;right:20px;font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--w50);background:transparent;border:none;cursor:pointer;}
.prog-section-label{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--w25);margin-bottom:12px;margin-top:20px;}
.prog-section-label:first-child{margin-top:0;}
.prog-stat-row{display:flex;gap:10px;margin-bottom:16px;}
.prog-stat{flex:1;background:var(--bg3);border-radius:8px;padding:12px 14px;}
.prog-stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--white);line-height:1;}
.prog-stat-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--w50);margin-top:4px;}
.prog-ex-row{padding:12px 0;border-bottom:1px solid var(--rule);}
.prog-ex-row:last-child{border-bottom:none;}
.prog-ex-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:var(--white);margin-bottom:4px;}
.prog-ex-current{font-size:11px;color:var(--w50);letter-spacing:.03em;margin-bottom:2px;}
.prog-ex-next{font-size:11px;color:var(--pink);letter-spacing:.03em;}
.prog-ex-ready{font-size:11px;color:var(--orange);font-weight:600;letter-spacing:.03em;}
.prog-day-pip{flex:1;height:5px;border-radius:3px;background:var(--w10);}
.prog-day-pip.done{background:var(--orange);}
.prog-day-pip.today{background:var(--pink);}

/* CONFIRM OVERLAY */
#confirm-overlay{background:rgba(20,24,34,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);text-align:center;padding:40px 32px;}
#confirm-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--white);margin-bottom:8px;line-height:1.2;}
#confirm-sub{font-size:12px;color:var(--w50);letter-spacing:.04em;margin-bottom:36px;line-height:1.6;}
.confirm-btn-row{display:flex;flex-direction:column;gap:10px;width:100%;}
.confirm-yes{width:100%;padding:16px;background:transparent;border:1px solid var(--pink);border-radius:8px;color:var(--pink);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;}
.confirm-no{width:100%;padding:16px;background:transparent;border:1px solid var(--rule);border-radius:8px;color:var(--w50);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;}

/* TOASTS */
#new-weight-toast,#prog-toast{position:fixed;left:20px;right:20px;border-radius:8px;padding:12px 16px;font-size:12px;color:var(--white);z-index:300;pointer-events:none;opacity:0;transition:all 0.3s;}
#new-weight-toast{top:80px;background:var(--bg3);border:1px solid var(--orange);transform:translateY(-6px);}
#new-weight-toast.show{opacity:1;transform:translateY(0);}
#prog-toast{bottom:90px;background:var(--bg3);border:1px solid var(--pink);transform:translateY(6px);}
#prog-toast.show{opacity:1;transform:translateY(0);}
.toast-lbl{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px;}
#new-weight-toast .toast-lbl{color:var(--orange);}
#prog-toast .toast-lbl{color:var(--pink);}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <img id="logo-img" src="lmq-icon.png" alt="LMQ"
      onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block';">
    <div id="logo-fallback" style="display:none;">LMQ</div>
    <div id="workout-label">Summer Workout <span id="wcount-display">1</span> of 32</div>
    <button id="user-btn" onclick="showUserOverlay()"></button>
  </div>

  <!-- GREETING SCREEN (shown first each session) -->
  <div id="greeting-screen">
    <div id="greeting-hi"></div>
    <div id="greeting-sub"></div>

    <!-- Recommended next workout — big pink card -->
    <button id="greeting-recommended" onclick="startRecommended()">
      <div id="greeting-rec-label">Next Up</div>
      <div id="greeting-rec-title"></div>
      <div id="greeting-rec-sub"></div>
    </button>

    <!-- Other two options — full cards, dark -->
    <button id="alt-a" onclick="startWorkout('A')"
      style="background:var(--bg2);border:1px solid var(--rule);border-radius:12px;padding:20px;margin-bottom:10px;cursor:pointer;width:100%;text-align:left;display:none;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--white);">Push Day</div>
    </button>

    <button id="alt-b" onclick="startWorkout('B')"
      style="background:var(--bg2);border:1px solid var(--rule);border-radius:12px;padding:20px;margin-bottom:10px;cursor:pointer;width:100%;text-align:left;display:none;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--white);">Pull Day</div>
    </button>

    <button id="alt-rest" onclick="startWorkout('rest')"
      style="background:var(--bg2);border:1px solid var(--rule);border-radius:12px;padding:20px;margin-bottom:10px;cursor:pointer;width:100%;text-align:left;display:none;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--white);">Rest Day</div>
    </button>

    <div id="greeting-focus">
      <div id="greeting-focus-label">Today's Focus</div>
      <div id="greeting-focus-text"></div>
    </div>
  </div>

  <!-- WORKOUT BODY -->
  <div id="body">
    <div id="focus-bar">
      <div id="focus-label">Today's Focus</div>
      <div id="focus-text"></div>
    </div>
    <div id="ex-list"></div>
    <div style="display:flex;justify-content:center;gap:24px;padding:20px 0 4px;">
      <button onclick="askSkipDay()" style="font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--w25);background:transparent;border:none;cursor:pointer;">Skip Today</button>
      <button onclick="askResetToDay1()" style="font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--w25);background:transparent;border:none;cursor:pointer;">Reset to Day 1</button>
    </div>
    <div id="scroll-spacer"></div>
  </div>

  <!-- REST / DAY 7 SCREEN -->
  <div id="day-screen">
    <div id="day-icon"></div>
    <div id="day-type"></div>
    <div id="day-title"></div>
    <div id="day-idea"></div>
    <div class="day-skip-row">
      <button class="day-action-btn day-skip" onclick="askSkipDay()">Skip Today</button>
      <button class="day-action-btn day-reset" onclick="askResetToDay1()">Reset to Day 1</button>
    </div>
  </div>

  <div id="bottombar">
    <button class="bar-btn" onclick="showProgressOverlay()">Progress</button>
    <button class="bar-btn" onclick="showStyleOverlay()">Style</button>
  </div>

</div>

<!-- REST TIMER -->
<div class="overlay" id="rest-overlay">
  <div id="rest-label">Rest</div>
  <div id="rest-num">45</div>
  <div id="rest-next"></div>
  <div id="rest-ready"></div>
  <button id="rest-skip" onclick="skipRest()">Skip Rest</button>
</div>

<!-- USER OVERLAY -->
<div class="overlay" id="user-overlay">
  <button class="user-name-btn" id="u-bianca" onclick="switchUser('bianca')">Bianca</button>
  <div class="user-divider"></div>
  <button class="user-name-btn" id="u-rita" onclick="switchUser('rita')">Rita</button>
  <button id="user-dismiss" onclick="hideUserOverlay()">Cancel</button>
</div>

<!-- DAY 7 PICKER -->
<div class="overlay" id="day7-overlay">
  <div id="day7-title">Day 7 — Your Choice</div>
  <div id="day7-sub">What kind of Day 7 do you want?</div>
  <button class="d7-btn" onclick="setDay7('adventure')">
    <div class="d7-btn-title">Adventure Day</div>
    <div class="d7-btn-sub">Get out and explore NYC</div>
  </button>
  <button class="d7-btn" onclick="setDay7('cardio')">
    <div class="d7-btn-title">Cardio Day</div>
    <div class="d7-btn-sub">Treadmill, bike, run, move</div>
  </button>
  <button class="d7-btn" onclick="setDay7('recovery')">
    <div class="d7-btn-title">Active Recovery</div>
    <div class="d7-btn-sub">Yoga, foam roll, stretch, breathe</div>
  </button>
  <button class="d7-btn" onclick="setDay7('wildcard')">
    <div class="d7-btn-title">Wild Card</div>
    <div class="d7-btn-sub">Surprise us</div>
  </button>
</div>

<!-- STYLE OVERLAY -->
<div class="overlay" id="style-overlay" onclick="if(event.target===this)hideStyleOverlay()">
  <div id="style-sheet">
    <button id="style-close" onclick="hideStyleOverlay()">Close</button>
    <div class="sty-label">Emoji</div>
    <div class="sty-emoji-row" id="sty-emoji"></div>
    <div class="sty-label">Color</div>
    <div class="sty-color-row" id="sty-color"></div>
    <div class="sty-label">Font</div>
    <div class="sty-font-row" id="sty-font"></div>
  </div>
</div>

<!-- PROGRESS OVERLAY -->
<div class="overlay" id="progress-overlay" onclick="if(event.target===this)hideProgressOverlay()">
  <div id="progress-sheet">
    <button id="progress-close" onclick="hideProgressOverlay()">Close</button>
    <div id="progress-content"></div>
  </div>
</div>

<!-- CONFIRM OVERLAY -->

function save() {

function load() {

function me()       { return S[S.user]; }
function pr()       { return me().prefs; }
function cd()       { return me().cycleDay; }
function dayType()  { return cd() === null ? null : CYCLE[cd() % 7]; }
function isWorkout(){ return dayType()==='A' || dayType()==='B'; }
function isRest()   { return dayType()==='rest'; }
function isDay7()   { return dayType()==='day7'; }

function getAccent(){ return ACCENTS.find(a=>a.k===pr().accent)||ACCENTS[0]; }
function getFont()  { return FONTS.find(f=>f.k===pr().font)||FONTS[0]; }
function getEmoji() { return (EMOJIS.find(e=>e.k===pr().emoji)||EMOJIS[0]).e; }

function getWeight(name) {
  const w = me().weights[name];
  if (w !== undefined) return w;
  const wt = dayType();
  if (wt==='A'||wt==='B') {
    const ex = WORKOUTS[wt].exercises.find(e=>e.name===name);
    if (ex) return ex.dw;
  }
  return 0;
}

function fullExList() {
  const wt = dayType();
  if (!wt || wt==='rest' || wt==='day7') return [];
  const pair = CORE_PAIRS[me().workoutCount % CORE_PAIRS.length];
  const core = pair.map(c=>({...c, sets:1, isCore:true}));
  return [...core, ...WORKOUTS[wt].exercises];
}

function recommendedType() {
  const d = cd();
  if (d === null) return 'A';
  return CYCLE[d % 7];
}

function applyTheme() {
  const ac = getAccent();
  const p = ac.p;
  const rgb = h => [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const [r,g,b] = rgb(p);
  document.documentElement.style.setProperty('--pink', p);
  document.documentElement.style.setProperty('--pink-dim', `rgba(${r},${g},${b},0.15)`);
  document.documentElement.style.setProperty('--orange', ac.o);
  document.documentElement.style.setProperty('--bg',  ac.bg);
  document.documentElement.style.setProperty('--bg2', ac.bg2);
  document.documentElement.style.setProperty('--bg3', ac.bg3);
  document.body.style.background = ac.bg;
}

function chime() {
  if ('vibrate' in navigator) navigator.vibrate([50,30,50]);
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(523, now);
    osc.frequency.exponentialRampToValueAtTime(1046, now+0.2);
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now+0.3);
    osc.start(now); osc.stop(now+0.35);
  } catch(e){}
}

  document.getElementById('day-screen').classList.remove('show');

    document.getElementById('day7-overlay').classList.add('show');
    return;

  if (S.screen === 'greeting') {
    renderGreeting();

    renderWorkout();

function renderExerciseList() {
  const list = document.getElementById('ex-list');

    const note = document.createElement('div');

    const status = document.createElement('div');

          pip.className = 'set-pip'+(s<mySetIdx?' done':(s===mySetIdx?' active':''));

// ═══════════════════════════════════════════
//  GREETING ACTIONS
// ═══════════════════════════════════════════

function startRecommended() {
  const rec = recommendedType();
  startWorkout(rec);
}

function startWorkout(type) {
  if (type==='rest' || type==='day7') {
    // Set cycle to this day type
    const pos = CYCLE.indexOf(type);
    if (pos>=0) me().cycleDay = (me().cycleDay===null) ? pos : Math.floor((me().cycleDay||0)/7)*7 + pos;
    save();
    S.screen = 'day';
  } else {
    // A or B
    if (me().cycleDay===null) {
      me().cycleDay = type==='A' ? 0 : 1;
    } else {
      const pos = type==='A' ? 0 : 1;
      me().cycleDay = Math.floor(me().cycleDay/7)*7 + pos;
    }
    me().exIdx = 0;
    me().setIdx = 0;
    save();
    S.screen = 'workout';
  }
  render();
}

// ═══════════════════════════════════════════
//  WORKOUT ACTIONS
// ═══════════════════════════════════════════

function updateWeight(val) {
  const w = parseFloat(val);
  const exList = fullExList();
  const ex = exList[me().exIdx];
  if (!isNaN(w) && ex) {
    me().weights[ex.name] = w;
    save();
  }
}

function nailedit() {
  const exList = fullExList();
  const ex = exList[me().exIdx];

  if (!ex.isCore) {
    const rInput = document.getElementById('r-input');
    const reps = parseInt(rInput ? rInput.value : 0);
    if (!reps||reps<1) {
      if (rInput) { rInput.focus(); rInput.style.color='var(--pink)'; }
      return;
    }

    const name = ex.name;
    const weight = getWeight(name);
    const hist = me().history[name] || [];
    const last = hist[hist.length-1];
    const isNewWeight = hist.length>0 && last && last.weight!==weight;

    hist.push({weight, reps, date:new Date().toISOString()});
    me().history[name] = hist;

    if (isNewWeight && me().setIdx===0) {
      showToast('new-weight-toast','nw-msg',`${getEmoji()} ${name} — moving up to ${weight} lbs`);
    }

    const recent = hist.slice(-3);
    if (recent.length===3 && recent.every(s=>s.weight===weight&&s.reps>=15)) {
      const inc = typeof weight==='number' ? (weight<=20?5:(weight<=50?10:5)) : 0;
      if (inc>0) setTimeout(()=>showToast('prog-toast','prog-msg',`${name} — ready to move to ${weight+inc} lbs`),600);
    }
    save();
  }

  const lastSet = ex.isCore ? true : me().setIdx >= ex.sets-1;
  const lastEx  = me().exIdx >= exList.length-1;

  if (!lastSet) {
    me().setIdx++;
    save();
    showRest(`Set ${me().setIdx+1} of ${ex.sets}`);
  } else if (!lastEx) {
    me().exIdx++;
    me().setIdx = 0;
    save();
    const next = exList[me().exIdx];
    showRest(`Next: ${next.name}`, !ex.isCore);
  } else {
    me().workoutCount++;
    me().focusIdx = (me().focusIdx+1) % FOCUSES.length;
    me().cycleDay = (me().cycleDay||0) + 1;
    me().exIdx = 0;
    me().setIdx = 0;
    save();
    showRest('Workout done. See you next time.', true);
    // After rest, go back to greeting
    S.screen = 'greeting';
  }
}

// ═══════════════════════════════════════════
//  SKIP / RESET
// ═══════════════════════════════════════════

function skipDay() {
  me().cycleDay = (me().cycleDay||0) + 1;
  me().restIdeaIdx++;
  me().day7IdeaIdx++;
  save();
  S.screen = 'greeting';
  render();
}

function resetToDay1() {
  me().cycleDay = 0;
  me().exIdx = 0;
  me().setIdx = 0;
  save();
  S.screen = 'greeting';
  render();
}

function askSkipDay() {
  showConfirm(
    'Skip today?',
    'Moves you to the next day in your cycle. Your history stays intact.',
    'Yes, skip today',
    skipDay
  );
}

function askResetToDay1() {
  showConfirm(
    'Reset to Day 1?',
    'Restarts your Push/Pull cycle from the beginning. All logged weights and history are kept.',
    'Yes, reset cycle',
    resetToDay1
  );
}

// ═══════════════════════════════════════════
//  REST TIMER
// ═══════════════════════════════════════════

function showRest(label, betweenEx) {
  clearInterval(restInterval);
  restTime = betweenEx ? 60 : 45;
  chime();
  const numEl   = document.getElementById('rest-num');
  const nextEl  = document.getElementById('rest-next');
  const readyEl = document.getElementById('rest-ready');
  nextEl.textContent  = label;
  readyEl.textContent = '';

  function tick() {
    numEl.textContent   = restTime;
    numEl.className     = restTime<=10 ? 'urgent' : '';
    readyEl.textContent = restTime<=5 ? 'Get Ready' : '';
    if (restTime<=0) {
      clearInterval(restInterval);
      chime();
      hideRest();
      return;
    }
    restTime--;
  }
  tick();
  document.getElementById('rest-overlay').classList.add('show');
  restInterval = setInterval(tick,1000);
}

function skipRest() {
  clearInterval(restInterval);
  hideRest();
}

function hideRest() {
  document.getElementById('rest-overlay').classList.remove('show');
  render();
}

// ═══════════════════════════════════════════
//  USER OVERLAY
// ═══════════════════════════════════════════

function showUserOverlay() {
  document.getElementById('u-bianca').className='user-name-btn'+(S.user==='bianca'?' active':'');
  document.getElementById('u-rita').className='user-name-btn'+(S.user==='rita'?' active':'');
  document.getElementById('user-overlay').classList.add('show');
}

function hideUserOverlay() {
  document.getElementById('user-overlay').classList.remove('show');
}

function switchUser(name) {

  S.screen = 'greeting';
  save();
  hideUserOverlay();

}

//  DAY 7
// ═══════════════════════════════════════════

function setDay7(type) {
  me().day7type = type;
  save();
  document.getElementById('day7-overlay').classList.remove('show');
  S.screen = 'day';
  render();

// ═══════════════════════════════════════════
//  STYLE OVERLAY
// ═══════════════════════════════════════════

function showStyleOverlay() {
  renderStylePicker();
  document.getElementById('style-overlay').classList.add('show');
}

function hideStyleOverlay() {
  document.getElementById('style-overlay').classList.remove('show');
}

function renderStylePicker() {
  const er = document.getElementById('sty-emoji');
  er.innerHTML='';
  EMOJIS.forEach(em=>{
    const b=document.createElement('button');
    b.className='sty-em'+(pr().emoji===em.k?' sel':'');
    b.textContent=em.e;
    b.onclick=()=>{ pr().emoji=em.k; save(); renderStylePicker(); };
    er.appendChild(b);
  });

  const cr = document.getElementById('sty-color');
  cr.innerHTML='';
  ACCENTS.forEach(ac=>{
    const b=document.createElement('button');
    b.className='sty-col'+(pr().accent===ac.k?' sel':'');
    b.textContent=ac.name;
    b.style.borderLeft=`3px solid ${ac.p}`;
    b.onclick=()=>{ pr().accent=ac.k; save(); applyTheme(); renderStylePicker(); };
    cr.appendChild(b);
  });

  const fr = document.getElementById('sty-font');
  fr.innerHTML='';
  FONTS.forEach(ft=>{
    const b=document.createElement('button');
    b.className='sty-font'+(pr().font===ft.k?' sel':'');
    b.textContent=ft.name;
    b.style.fontFamily=ft.f;
    b.onclick=()=>{
      pr().font=ft.k; save();
      if (ft.url&&!document.querySelector(`link[data-fk="${ft.k}"]`)) {
        const lk=document.createElement('link');
        lk.rel='stylesheet'; lk.href=ft.url; lk.dataset.fk=ft.k;
        document.head.appendChild(lk);
      }
      applyTheme(); renderStylePicker();
    };
    fr.appendChild(b);
  });
}

// ═══════════════════════════════════════════
//  PROGRESS OVERLAY
// ═══════════════════════════════════════════

function showProgressOverlay() {
  renderProgress();
  document.getElementById('progress-overlay').classList.add('show');
}

function hideProgressOverlay() {
  document.getElementById('progress-overlay').classList.remove('show');
}

function renderProgress() {
  const el = document.getElementById('progress-content');
  const wc = me().workoutCount;
  const c  = me().cycleDay || 0;
  const dayInWeek = (c%7)+1;
  const weekNum   = Math.floor(c/7)+1;
  const allEx = [...WORKOUTS.A.exercises,...WORKOUTS.B.exercises];

  let html = `
    <div class="prog-section-label">Overall</div>
    <div class="prog-stat-row">
      <div class="prog-stat">
        <div class="prog-stat-num">${wc}</div>
        <div class="prog-stat-lbl">Done</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-num">${32-wc}</div>
        <div class="prog-stat-lbl">Left</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-num">Wk ${weekNum}</div>
        <div class="prog-stat-lbl">Week</div>
      </div>
    </div>
    <div class="prog-section-label">This Week — Day ${dayInWeek} of 7</div>
    <div style="display:flex;gap:4px;margin-bottom:16px;">
      ${CYCLE.map((_,i)=>{
        const pos=c%7;
        const cls=i<pos?'done':(i===pos?'today':'');
        const labels=['Push','Pull','Rest','Push','Pull','Rest','Day 7'];
        return `<div class="prog-day-pip ${cls}" title="${labels[i]}"></div>`;
      }).join('')}
    </div>
    <div class="prog-section-label">Exercise Progress</div>
  `;

  allEx.forEach(e=>{
    const hist = me().history[e.name] || [];
    const cw   = me().weights[e.name]!==undefined ? me().weights[e.name] : e.dw;
    const recent = hist.filter(h=>h.weight===cw).slice(-e.sets);
    const avgReps = recent.length>0
      ? Math.round(recent.reduce((a,b)=>a+b.reps,0)/recent.length) : 12;
    const disp = typeof cw==='number' ? `${cw} lbs` : cw;
    const current = `${e.sets}×${avgReps} @ ${disp}`;
    let next = '';
    if (typeof cw==='number') {
      const inc = cw<=20?5:(cw<=50?10:5);
      const ready = recent.length>=e.sets && recent.every(s=>s.reps>=15);
      next = ready
        ? `<div class="prog-ex-ready">Ready to move up → ${cw+inc} lbs</div>`
        : `<div class="prog-ex-next">Next goal: ${e.sets}×15 @ ${disp}</div>`;
    }
    html += `
      <div class="prog-ex-row">
        <div class="prog-ex-name">${e.name}</div>
        <div class="prog-ex-current">Current: ${current}</div>
        ${next}
      </div>`;
  });

  el.innerHTML = html;
}

// ═══════════════════════════════════════════
//  CONFIRM OVERLAY
// ═══════════════════════════════════════════

function showConfirm(title, sub, yesLabel, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-sub').textContent = sub;
  document.getElementById('confirm-yes-btn').textContent = yesLabel;
  confirmCb = cb;
  document.getElementById('confirm-overlay').classList.add('show');
}

function hideConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
  confirmCb = null;
}

document.getElementById('confirm-yes-btn').onclick = function() {
  hideConfirm();
  if (confirmCb) confirmCb();
};

// ═══════════════════════════════════════════
//  TOASTS
// ═══════════════════════════════════════════

function showToast(toastId, msgId, msg) {
  document.getElementById(msgId).textContent = msg;
  const el = document.getElementById(toastId);
  el.classList.add('show');
  clearTimeout(toastTimers[toastId]);
  toastTimers[toastId] = setTimeout(()=>el.classList.remove('show'), 4000);
}

load();
S.screen = 'greeting'; // Always start at greeting
render();
